spring:
  application:
    name: eventora
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventora_db}
    username: ${SPRING_DATASOURCE_USERNAME:eventora_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:your_very_secure_jwt_secret_key_that_is_long_enough_for_hs256}
  expiration: 900000 # 15 minutes
  refresh-expiration: 604800000 # 7 days

razorpay:
  key-id: ${RAZORPAY_KEY_ID:fake_id}
  key-secret: ${RAZORPAY_KEY_SECRET:fake_secret}

server:
  port: 8080
